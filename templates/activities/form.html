{% extends "base.html" %} {% block title %}{{ titulo_pagina }} - Huerta CEA{% endblock %} {% block content %} <h1 class="text-2xl font-bold text-green-800 mb-6">{{ titulo_pagina }}</h1>

<form method="post" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-xl space-y-4"> {% csrf_token %}

{% for field in form %} <div>     <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">         {{ field.label }}     </label>     {{ field }}     {% if field.errors %}     <p class="text-red-600 text-xs mt-1">{{ field.errors|join:", " }}</p>     {% endif %} </div> {% endfor %}  <div class="flex gap-3 pt-2">     <button type="submit" class="bg-green-600 hover:bg-green-500 text-white text-sm font-medium px-4 py-2 rounded transition">         Guardar     </button>     <a href="{% url 'activities:list' %}" class="text-sm text-gray-600 hover:text-gray-800 px-4 py-2">         Cancelar     </a> </div> 
</form> {% endblock %}
