{% extends 'base.html' %}
{% load static %}

{% block title %}Iniciar sesi&oacute;n - Huerta CEA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white rounded-xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-green-800 mb-6 text-center">Iniciar sesi&oacute;n</h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario</label>
            <input type="text" id="username" name="username" required autofocus
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                   placeholder="Tu nombre de usuario">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contrase&ntilde;a</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                   placeholder="Tu contrase&ntilde;a">
        </div>

        <button type="submit"
                class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">
            Entrar
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        &iquest;No tienes cuenta?
        <a href="{% url 'accounts:register' %}" class="text-green-700 hover:text-green-600 font-medium">Reg&iacute;strate aqu&iacute;</a>
    </p>
</div>
{% endblock %}
