{% extends 'base.html' %}
{% load static %}

{% block title %}Registrarse - Huerta CEA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white rounded-xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-green-800 mb-6 text-center">Crear cuenta</h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                <input type="text" id="nombre" name="nombre" value="{{ nombre|default:'' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
            </div>
            <div>
                <label for="apellido" class="block text-sm font-medium text-gray-700 mb-1">Apellido *</label>
                <input type="text" id="apellido" name="apellido" value="{{ apellido|default:'' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
            </div>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electronico *</label>
            <input type="email" id="email" name="email" value="{{ email|default:'' }}" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario *</label>
            <input type="text" id="username" name="username" value="{{ username|default:'' }}" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Tel&eacute;fono (opcional)</label>
            <input type="tel" id="telefono" name="telefono" value="{{ telefono|default:'' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contrase&ntilde;a *</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirmar contrase&ntilde;a *</label>
            <input type="password" id="password2" name="password2" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <button type="submit"
                class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">
            Crear cuenta
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        &iquest;Ya tienes cuenta?
        <a href="{% url 'accounts:login' %}" class="text-green-700 hover:text-green-600 font-medium">Inicia sesi&oacute;n</a>
    </p>
</div>
{% endblock %}
